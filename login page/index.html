<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fitness Platform</title>
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap"
      rel="stylesheet"
    />

    <!-- Tailwind CSS -->
    <link href="./css/output.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div class="min-h-screen flex items-center justify-center p-5">
        <div class="w-full max-w-md rounded-2xl  p-8">
            <h2 class="text-3xl text-center font-bold text-gray-800">Welcome Back</h2>
            <p class="text-gray-500 text-center mt-2 mb-8">Login to continue</p>
            <form id="loginForm">
                <div class="mb-5">
                    <label class="text-sm font-medium text-gray-700">Email</label>
                    <input type="email" id="email" class="w-full border-purple-200 border-2 rounded-xl  px-5 py-2 flex items-center justify-between" placeholder="Enter Your Email...">
                    <small id="emailError" class="text-red-500"></small>
                </div>
                <div class="mb-2">
                    <label class="text-sm font-medium text-gray-700">Password</label>
                    <div class="w-full border-purple-200 border-2 rounded-xl  px-5 py-2 flex items-center justify-between">
                    <input class="focus:outline-none" type="password" name="password" id="password" placeholder="Enter Your Password..."> 
                        <img id="eyeicon" class="w-5 h-3 cursor-pointer" src="eye-close.png" alt="">
                    </div>
                    <small id="passwordError" class="text-red-500"></small>
                </div>
                <div class="flex justify-end items-center mb-6">
                    <a href="#" class="text-indigo-500 text-sm">Forgot Password?</a>
                </div>
                <button type="submit"class="w-full bg-indigo-500 hover:bg-indigo-600 text-white py-3 rounded-lg duration-300">Sign In</button>
                <div class="flex items-center my-6">
                    <div class="flex-1 h-px bg-gray-300"></div>
                    <span class="px-4 text-gray-400 text-sm"> OR </span>
                    <div class="flex-1 h-px bg-gray-300"></div>
                </div>
                <button type="button" class="w-full border rounded-lg py-3 flex justify-center items-center gap-3 hover:bg-gray-100">
                    <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-5">
                    Continue with Google
                </button>
                <p class="text-center mt-6 text-sm">
                    Don't have an account?
                    <a href="../signup page/index.html" class="text-indigo-600 font-semibold">Sign Up</a>
                </p>
            </form>
        </div>
    </div>
<script src="script.js"></script>

</body>
</html>
