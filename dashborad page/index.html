<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Dashboard Page</title>
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap"
      rel="stylesheet"
    />

    <!-- Tailwind CSS -->
    <link href="./css/output.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white">
    <nav class="bg-blue-600 shadow-lg">
        <div class="w-full px-6 py-4 flex justify-between items-center">
            <img src="images/white-logo.svg" alt="">       
            <button class="bg-white text-blue-600 px-5 py-2 rounded-lg font-semibold hover:bg-blue-50 transition">Logout</button>
        </div>
    </nav>
    <div class="w-full p-6">
        <div class="grid lg:grid-cols-4 gap-6">
            <div class="bg-white rounded-2xl shadow-xl border p-6">
                <div class="flex flex-col items-center">
                    <img class="w-36 h-36 rounded-full border-4 border-gray-700 object-cover" src="images/profile-add-svgrepo-com.svg">
                    <h2 class="mt-5 text-2xl font-bold">User</h2>
                    <button class="mt-5 bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition">Edit Profile</button>
                </div>
                <hr class="my-6">
                <div class="space-y-4">
                    <div class="flex justify-between">
                       <span>Age</span>
                       <span class="font-semibold">22</span>
                    </div>
                    <div class="flex justify-between">
                        <span>Height</span>
                        <span class="font-semibold">175 cm</span>
                    </div>
                    <div class="flex justify-between">
                        <span>Weight</span>
                        <span class="font-semibold">72 kg</span>
                    </div>
                    <div class="flex justify-between">
                        <span>BMI</span>
                        <span class="font-bold">23.5</span>
                    </div>
                </div>
            </div>
            <div class="lg:col-span-3">
                <div class="bg-white shadow-xl rounded-2xl border p-8">
                    <h2 class="text-2xl font-bold mb-6">My Fitness Goal :</h2>
                    <div class="w-full bg-gray-200 rounded-full h-6">
                        <div id="progress" class="bg-blue-600 h-6 rounded-full text-right pr-3 text-white font-semibold" style="width:0%">0%</div>
                    </div>
                    <p class="mt-5 text-gray-600">Goal : Lose 15kg in 2 Months</p>
                </div>
               <div class="bg-white shadow-xl rounded-2xl border mt-8 p-8">
                <h2 class="text-2xl font-bold mb-6">Weekly Output</h2>
                <div class="space-y-5">
                    <div class="flex items center justify-between">
                            <div>
                                <h3 class="font-semibold">Chest Workout</h3>
                                <p class="text-gray-500 text-sm">Today</p>
                            </div>
                        <span class="font-bold text-blue-600">1 Hr</span>
                    </div>
                    <div class="flex items-center justify-between">
                            <div>
                                <h3 class="font-semibold">Cardio Session</h3>
                                <p class="text-gray-500 text-sm">Yesterday</p>
                            </div>
                        <span class="font-bold text-blue-600">45 Min</span>
                    </div>
                    <div class="flex items-center justify-between">
                            <div>
                                <h3 class="font-semibold">Weight Updated</h3>
                                <p class="text-gray-500 text-sm">3 Days Ago</p>
                            </div>
                        <span class="font-bold text-blue-600">72 KG</span>
                    </div>
                </div>
               </div>
            </div>
        </div>
    </div>


    <script src="script.js"></script>
</body>
