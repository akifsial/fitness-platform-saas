<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BMI Calculator !</title>
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap"
      rel="stylesheet"
    />

    <!-- Tailwind CSS -->
    <link href="./css/output.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div class="w-full mt-20 flex flex-col gap-10 justify-center items-center">
    <div class="text-center">
      <p class="text-4xl font-bold">BMI Calculator</p>
      <p>Calculate your Body Mass Index</p>
    </div>
    <div class="items-start flex flex-col gap-5">
      <div class="flex items-center gap-5">
        <label>AGE</label>
        <input class="border-2 px-5 py-1 border-blue-300 rounded-xl focus:outline-none shadow-xl" type="number" id="ageId" placeholder="Enter Your Age">
        <span>Age's: 2-120</span>
      </div>
      <div class="flex items-center gap-5">
        <p>Gender :</p>
          <div class="flex gap-5">
            <div>
              <input type="radio" id="male" name="gender" value="male">
              <label for="male">Male</label>
            </div>
            <div>
              <input type="radio" id="female" name="gender" value="female">
              <label for="female">Female</label>
            </div>
          </div>
      </div>
      <div class="flex items-center gap-5">
        <label>Height (cm)</label>
        <div class="border-2 px-2.5 py-1 shadow-xl border-blue-300 rounded-xl">
          <input class="focus:outline-none" type="number" id="heightId">
          <span class="text-gray-300">Centimeter</span>
        </div>
      </div>
      <div class="flex items-center gap-5">
        <label>Weight (kg)</label>
        <div class="border-2 px-5 py-1 shadow-xl border-blue-300 rounded-xl">
          <input class="focus:outline-none" type="number" id="weightId">
          <span class="text-gray-300">Kilogram</span>
        </div>
      </div> 
    </div> 
    <div class="flex items-center gap-5">
        <button id="btnId" class="shadow-xl px-5 py-2.5 bg-blue-500 text-white font-bold text-xl rounded-xl">Calculate</button>
        <button id="clearId" class="px-5 shadow-xl py-2.5 bg-blue-500 text-white font-bold text-xl rounded-xl">Clear</button>
    </div>
    <div id="resultId"></div>
  </div>
<script src="srcipt.js"></script>

</body>
</html>
